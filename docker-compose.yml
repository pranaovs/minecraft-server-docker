services:
  minecraft:
    image: itzg/minecraft-server:latest
    tty: true
    stdin_open: true
    stop_grace_period: "1m"
    container_name: minecraft-server
    ports:
      - "25565:25565"
      - "25565:25565/udp"
      - "19132:19132/udp"
      - "19133:19133/udp"
      - "24454:24454/udp"

    environment:
      EULA: "TRUE"
      TYPE: "FABRIC"
      VERSION: "1.21.11"

      MAX_MEMORY: "4096M"
      MOTD: "TEJAAAAS WORLD"
      ONLINE_MODE: "false"
      ENABLE_QUERY: "true"
      USE_AIKAR_FLAGS: "true"
      USE_MEOWICE_FLAGS: "true"
      TZ: "Asia/Kolkata"
      DIFFICULTY: "2"
      VIEW_DISTANCE: "10"
      SIMULATION_DISTANCE: "6"
      MODRINTH_PROJECTS: |-

        lithium
        krypton
        ferrite-core
        c2me-fabric
        alternate-current
        badpackets
        servercore
        scalablelux
        tt20
        noisiumforked
        chunky
        fast-item-frames
        modernfix-mvus

        appleskin
        simple-voice-chat
        ore-harvester
        tree-harvester
        villager-names-serilum
        rightclickharvest
        easyauth
        your-items-are-safe
        inventory-sorting
        no-dim
        map-distance-fix
        bookshelf-inspector
        flower-mimics
        improved-happy-ghast
        enchantment-lore

        katters-structures
        towns-and-towers
        more-armor-trims
        dungeons-and-taverns

      MODRINTH_DOWNLOAD_DEPENDENCIES: "required"
      ENFORCE_SECURE_PROFILE: "false"
      RCON_CMDS_STARTUP: |-
        gamerule players_sleeping_percentage 1
      BUG_REPORT_LINK: "https://github.com/pranaovs/minecraft-server-docker"
      LOG_TIMESTAMP: "true"

    restart: always

    volumes:
      - "./data:/data:U"
